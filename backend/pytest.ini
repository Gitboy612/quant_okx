[pytest]
# 测试路径
testpaths = tests

# 忽略 e2e 测试目录（需模拟盘 API，CI 中不运行）
norecursedirs = tests/e2e
addopts = --ignore=tests/e2e

# pytest-asyncio 自动模式：无需为每个 async 测试加 @pytest.mark.asyncio
asyncio_mode = auto

# 自定义 markers
markers =
    slow: 标记为耗时较长的测试（CI 默认可跳过 -m "not slow"）
    integration: 标记为集成测试（依赖外部服务或数据库）
    perf: 性能基准测试标记（可通过 -m "not perf" 在 CI 中选择性跳过）
    demo: 标记为需模拟盘/真实 API 的 E2E 测试（可通过 -m "not demo" 跳过）
